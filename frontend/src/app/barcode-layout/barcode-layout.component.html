@if (form) {
  <ng-container [formGroup]="form.controls.layout">
    <div class="row">
      <div class="form-group col-sm">
        <label class="form-label" for="pagesize">Page size</label>
        <select class="form-select" formControlName="pagesize">
          <option value="a4">A4</option>
          <option value="letter">Letter</option>
        </select>
      </div>
      <div class="form-group col-sm">
        <label class="form-label" for="cols">Columns</label>
        <input class="form-control" type="number" formControlName="cols" />
      </div>
      <div class="form-group col-sm">
        <label class="form-label" for="rows">Rows</label>
        <input class="form-control" type="number" formControlName="rows" />
      </div>
    </div>
    <div class="row mt-3">
      <div class="col-md-6 col-lg-3">
        <app-millimeters formControlName="marginLeft"
          >Page left margin</app-millimeters
        >
      </div>
      <div class="col-md-6 col-lg-3">
        <app-millimeters formControlName="marginTop"
          >Page top margin</app-millimeters
        >
      </div>
      <div class="col-md-6 col-lg-3">
        <app-millimeters formControlName="spacingCol"
          >Spacing between columns</app-millimeters
        >
      </div>
      <div class="col-md-6 col-lg-3">
        <app-millimeters formControlName="spacingRow"
          >Spacing between rows</app-millimeters
        >
      </div>
    </div>
  </ng-container>
}
